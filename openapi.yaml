openapi: 3.0.3
info:
  title: Bitcoin Blockchain Explorer API
  description: >
    Versioned JSON API under `/api/v1`. Hand-maintained; mirrors route registration in
    `internal/server/routes.go`. Deprecation schedule and sunset headers:
    docs/API_VERSIONING.md. Session auth uses the `session_id` cookie; state-changing
    requests with that cookie require `X-CSRF-Token` (see `csrfMiddleware` in the server).
    Correlation IDs propagate via `X-Correlation-ID` / `X-Request-ID`.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: "{baseUrl}"
    variables:
      baseUrl:
        default: http://localhost:8080
        description: Origin (no trailing slash)

# Default: no API key or cookie required; override with `security` on protected operations.
security: []

tags:
  - name: explorer
    description: Search, chain data, exports, rates (mostly public)
  - name: feedback
    description: User feedback submission
  - name: news
    description: Symbol news and portfolio-scoped news feeds
  - name: auth
    description: Login, logout, register (no prior session required)
  - name: user
    description: Authenticated user profile, notifications, alerts, portfolios, watchlists
  - name: admin
    description: Admin role required (`admin` user)

paths:
  /api/v1/search:
    get:
      tags: [explorer]
      summary: Search blocks, transactions, or addresses
      operationId: search
      parameters:
        - $ref: "#/components/parameters/QueryQ"
      responses:
        "200":
          description: Search result envelope (JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/search/export:
    get:
      tags: [explorer]
      summary: Export search results (JSON)
      operationId: exportSearch
      parameters:
        - $ref: "#/components/parameters/QueryQ"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: JSON export (see Idempotent-Replayed header for idempotent replays)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/search/advanced:
    get:
      tags: [explorer]
      summary: Advanced symbol search (filters, pagination, sort)
      operationId: advancedSearch
      parameters:
        - $ref: "#/components/parameters/QueryQ"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: types
          in: query
          schema:
            type: string
        - name: categories
          in: query
          schema:
            type: string
        - name: min_price
          in: query
          schema:
            type: string
        - name: max_price
          in: query
          schema:
            type: string
        - name: min_market_cap
          in: query
          schema:
            type: string
        - name: max_market_cap
          in: query
          schema:
            type: string
        - name: is_active
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            description: Allowed fields include symbol, name, category, market_cap, price, rank, etc.
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Advanced search payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/search/advanced/export:
    get:
      tags: [explorer]
      summary: Export advanced search (JSON)
      operationId: exportAdvancedSearch
      parameters:
        - $ref: "#/components/parameters/QueryQ"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: JSON export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/search/categories:
    get:
      tags: [explorer]
      summary: Symbol category list
      operationId: getSymbolCategories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/blocks/export/csv:
    get:
      tags: [explorer]
      summary: Export blocks as CSV
      operationId: exportBlocksCSV
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/transactions/export/csv:
    get:
      tags: [explorer]
      summary: Export transactions as CSV
      operationId: exportTransactionsCSV
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/autocomplete:
    get:
      tags: [explorer]
      summary: Autocomplete suggestions
      operationId: autocomplete
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Autocomplete hits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/metrics:
    get:
      tags: [explorer]
      summary: Aggregated explorer metrics (network-style stats)
      operationId: getExplorerMetrics
      responses:
        "200":
          description: Metrics JSON (not Prometheus format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/network-status:
    get:
      tags: [explorer]
      summary: Network status snapshot
      operationId: getNetworkStatus
      responses:
        "200":
          description: Network status JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/rates:
    get:
      tags: [explorer]
      summary: Fiat/crypto reference rates
      operationId: getRates
      responses:
        "200":
          description: Rates envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/price-history:
    get:
      tags: [explorer]
      summary: Historical price series
      operationId: getPriceHistory
      parameters:
        - name: currency
          in: query
          schema:
            type: string
            default: usd
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Price history points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/feedback:
    post:
      tags: [feedback]
      summary: Submit user feedback
      operationId: postFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Acknowledgement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/news/{symbol}:
    get:
      tags: [news]
      summary: News for a market symbol
      operationId: newsBySymbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSizeNews"
      responses:
        "200":
          description: News feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/news/portfolio/{id}:
    get:
      tags: [news]
      summary: News scoped to a portfolio (authenticated)
      operationId: newsByPortfolio
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSizeNews"
      responses:
        "200":
          description: News feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/login:
    post:
      tags: [auth]
      summary: Login (sets session cookie)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Session established; `csrfToken` may be included in body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/logout:
    post:
      tags: [auth]
      summary: Logout (clears session)
      operationId: logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/register:
    post:
      tags: [auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                email:
                  type: string
      responses:
        "200":
          description: Registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/profile:
    get:
      tags: [user]
      summary: Current user profile
      operationId: getUserProfile
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    patch:
      tags: [user]
      summary: Update profile
      operationId: patchUserProfile
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/password:
    patch:
      tags: [user]
      summary: Change password (rotates CSRF)
      operationId: changePassword
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
      responses:
        "200":
          description: Success; new csrfToken in body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/notifications:
    get:
      tags: [user]
      summary: List notifications
      operationId: listNotifications
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/notifications/{id}:
    put:
      tags: [user]
      summary: Update a notification
      operationId: updateNotification
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [user]
      summary: Dismiss notification
      operationId: dismissNotification
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/alerts:
    get:
      tags: [user]
      summary: List price alerts
      operationId: listPriceAlerts
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    post:
      tags: [user]
      summary: Create price alert
      operationId: createPriceAlert
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/alerts/{id}:
    put:
      tags: [user]
      summary: Update price alert
      operationId: updatePriceAlert
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [user]
      summary: Delete price alert
      operationId: deletePriceAlert
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/portfolios:
    get:
      tags: [user]
      summary: List portfolios
      operationId: listPortfolios
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: sort_by
          in: query
          schema:
            type: string
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Portfolio list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    post:
      tags: [user]
      summary: Create portfolio
      operationId: createPortfolio
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/portfolios/export:
    get:
      tags: [user]
      summary: Export portfolios (JSON aggregate)
      operationId: exportPortfolios
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: JSON export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/portfolios/{id}/export/csv:
    get:
      tags: [user]
      summary: Export portfolio holdings CSV
      operationId: exportPortfolioCSV
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/portfolios/{id}/export/pdf:
    get:
      tags: [user]
      summary: Export portfolio PDF
      operationId: exportPortfolioPDF
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/portfolios/{id}:
    put:
      tags: [user]
      summary: Update portfolio
      operationId: updatePortfolio
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [user]
      summary: Delete portfolio
      operationId: deletePortfolio
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/watchlists:
    get:
      tags: [user]
      summary: List watchlists
      operationId: listWatchlists
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Watchlists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    post:
      tags: [user]
      summary: Create watchlist
      operationId: createWatchlist
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/watchlists/{id}:
    get:
      tags: [user]
      summary: Get watchlist by id
      operationId: getWatchlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Watchlist detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    put:
      tags: [user]
      summary: Update watchlist
      operationId: updateWatchlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [user]
      summary: Delete watchlist
      operationId: deleteWatchlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/watchlists/{id}/entries:
    post:
      tags: [user]
      summary: Add watchlist entry
      operationId: addWatchlistEntry
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/user/watchlists/{id}/entries/{index}:
    put:
      tags: [user]
      summary: Update watchlist entry by index
      operationId: updateWatchlistEntry
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericJSON"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [user]
      summary: Delete watchlist entry
      operationId: deleteWatchlistEntry
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/admin/status:
    get:
      tags: [admin]
      summary: Operational status (feature flags, email queue snapshot, etc.)
      operationId: adminStatus
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Admin status JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

  /api/v1/admin/cache:
    get:
      tags: [admin]
      summary: Cache introspection / admin cache view
      operationId: adminCache
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Cache info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericJSON"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        default:
          $ref: "#/components/responses/ApiError"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_id
      description: Session established via POST /api/v1/login

  parameters:
    QueryQ:
      name: q
      in: query
      description: Search query string
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    PageSizeNews:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
      description: News lists cap at 50 per page
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional; export endpoints may de-duplicate identical replays (see docs/IDEMPOTENCY_KEYS.md)
      schema:
        type: string
    CsrfHeader:
      name: X-CSRF-Token
      in: header
      required: false
      description: >
        Required when `session_id` is sent and the request is state-changing (POST/PUT/PATCH/DELETE)
        or targets `/api/v1/admin/*`. Browser clients receive the token from login/profile responses.

      schema:
        type: string

  schemas:
    ApiErrorBody:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        correlation_id:
          type: string
          description: Present when correlation middleware generated or propagated an ID

    GenericJSON:
      type: object
      additionalProperties: true
      description: Application-specific JSON (success envelopes vary by route)

  responses:
    ApiError:
      description: Structured error (may include correlation_id)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
