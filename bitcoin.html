<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="content-type" content="text/html; charset=utf-8"/>
		<title>Blockchain Explorer</title>
		<style type="text/css">
			p {
				line-height: 115%;
				margin-bottom: 0.1in;
				background: transparent;
			}
			td p {
				orphans: 0;
				widows: 0;
				background: transparent;
			}
			table {
				width: 100%;
			}
		</style>
	</head>
<body lang="en-US" link="#000080" vlink="#800000" dir="ltr">
<header class="explorer-header">
	<img src="images/logo.jpg" width="100" alt="Explorer Logo">
	<div class="address-view">
		<span>Viewing:</span>
		<span class="address-text"><i>Address</i></span>
	</div>
</header>

<main class="blockchain-info">
	<section class="network-status">
		<img src="images/btc-logo.png" 
		     height="50" 
		     width="auto" 
		     alt="Bitcoin Network Logo"
		     loading="lazy">
		<p>Blockchain: Bitcoin</p>
		<p>Network status: <i>Operating</i></p>
	</section>
	
	<section class="balance-info">
		<div class="infographic"></div>
		<div class="balance-details">
			<p>Current balance:</p>
			<p>Total received:</p>
			<p>Total sent:</p>
		</div>
	</section>

	<section class="transactions">
		<h2>Transactions:</h2>
		<div class="transaction-item">
			<div class="tx-icon"></div>
			<div class="tx-addresses">
				<p>From: <i>Address</i></p>
				<p>To: <i>Address</i></p>
			</div>
			<div class="tx-details">
				<p>Amount:</p>
				<p>Confirmations: 1</p>
				<p>Fee:</p>
			</div>
		</div>
	</section>
</main>
</body>
</html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
