<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - Blockchain Explorer</title>
    <link rel="stylesheet" href="/dist/styles.css" />
</head>
<body class="min-h-screen bg-gray-50 text-slate-900 dark:bg-gray-900 dark:text-slate-100">
    <!-- Header -->
    <header class="w-full bg-white shadow dark:bg-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3" aria-label="Homepage - Blockchain Explorer">
                <img src="/images/btc-logo.png" alt="Bitcoin logo" class="h-10 w-10 object-contain" />
                <span class="font-semibold text-lg">Blockchain Explorer</span>
            </a>
            <div class="flex items-center gap-4">
                <!-- Theme selector -->
                <div class="flex items-center gap-2">
                    <label for="theme-select" class="sr-only">Select theme</label>
                    <select id="theme-select" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="purple">Purple</option>
                        <option value="orange">Orange</option>
                    </select>
                </div>
                <div id="user-info" class="hidden text-sm text-slate-700 dark:text-slate-300">
                    Logged in as: <span id="username"></span>
                    <button id="logout-btn" class="ml-4 text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Login Form -->
        <div id="login-section" class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-lg shadow p-6">
            <h1 class="text-2xl font-bold mb-6 text-center">Admin Login</h1>
            <form id="login-form">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" id="username-input" name="username" required
                           class="w-full p-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password-input" name="password" required
                           class="w-full p-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg hover:bg-blue-600">
                    Login
                </button>
            </form>
            <div id="login-error" class="mt-4 text-red-600 text-center hidden"></div>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboard-section" class="hidden">
            <h1 class="text-3xl font-bold mb-8">Admin Dashboard</h1>

            <!-- System Status -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4">System Status</h2>
                <div id="system-status" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Status will be populated by JavaScript -->
                </div>
                <button id="refresh-status" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Refresh Status
                </button>
            </div>

            <!-- Cache Management -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Cache Management</h2>

                <!-- Cache Stats -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-3">Cache Statistics</h3>
                    <div id="cache-stats" class="bg-gray-50 dark:bg-gray-700 p-4 rounded">
                        <p class="text-gray-600 dark:text-gray-400">Click "View Cache Stats" to load statistics</p>
                    </div>
                    <button id="view-cache-stats" class="mt-3 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                        View Cache Stats
                    </button>
                </div>

                <!-- Clear Cache -->
                <div>
                    <h3 class="text-lg font-medium mb-3">Clear Cache</h3>
                    <p class="text-gray-600 dark:text-gray-400 mb-3">
                        This will clear all cached data. Use with caution as it may temporarily slow down the application.
                    </p>
                    <button id="clear-cache" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        Clear All Cache
                    </button>
                    <div id="cache-result" class="mt-3 hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/degraded-mode.js" defer></script>
    <script src="/static/js/script.js"></script>
</body>
</html>
