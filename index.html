<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    /* Inline critical CSS for faster initial rendering */
    body {
        font-family: Arial, sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        position: relative;
        overflow: hidden;
    }
    .container {
        text-align: center;
        z-index: 1;
    }
    .logo {
        max-width: 350px;
        margin-bottom: 20px;
    }
    .search-container {
        position: relative;
        display: inline-block;
    }
    .search-bar {
        width: 800px;
        height: 30px;
        padding: 10px 30px 10px 10px;
        font-size: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .search-icon {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        background-image: url("images/magnifying-glass.png");
        background-repeat: no-repeat;
        background-size: contain;
        cursor: pointer;
    }
    #result-container {
        margin-top: 20px;
        text-align: left;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }
    .result-item {
        background-color: #fff;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        padding: 15px;
        margin-bottom: 15px;
    }
    .result-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
    }
    .result-detail {
        margin-bottom: 5px;
    }
    .result-label {
        font-weight: bold;
    }
    .error-message {
        color: #dc3545;
        font-weight: bold;
    }
    .loading {
        display: inline-block;
        font-size: 24px;
        font-weight: bold;
        color: #666;
        animation: loading 1.4s infinite;
    }
    @keyframes loading {
        0%, 20% { content: "⋅"; }
        40% { content: "⋅⋅"; }
        60% { content: "⋅⋅⋅"; }
        80%, 100% { content: ""; }
    }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/logo.jpg" alt="Blockchain Explorer Logo" class="logo">
        <br><br><br>
        <div class="search-container">
            <input type="text" id="search-input" class="search-bar" placeholder="Search by block height, transaction hash, or address...">
            <span id="search-icon" class="search-icon"></span>
        </div>
        <div id="result-container"></div>
    </div>
    <script>
    // Add debounce utility function
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    // Create debounced version of performSearch
    const debouncedSearch = debounce(performSearch, 500);

    // Update event listeners to use debounced search
    document.querySelector('#search-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            debouncedSearch(e.target.value);
        }
    });

    document.querySelector('#search-icon').addEventListener('click', function() {
        const query = document.querySelector('#search-input').value;
        debouncedSearch(query);
    });

    function validateSearchQuery(query) {
        // Remove whitespace
        const cleanQuery = query.trim();
        
        // Check if empty
        if (!cleanQuery) {
            return {
                isValid: false,
                error: "EMPTY_SEARCH"
            };
        }

        // Check minimum length (typical blockchain addresses/hashes are at least 26 chars)
        if (cleanQuery.length < 8) {
            return {
                isValid: false,
                error: "INVALID_SEARCH"
            };
        }

        // Regex for valid blockchain data
        const validPatterns = {
            // Hex format for transaction hashes and block hashes
            hash: /^[0-9a-fA-F]{64}$/,
            // Common address formats (BTC, ETH)
            address: /^[13][a-km-zA-HJ-NP-Z1-9]{25,34}$|^0x[0-9a-fA-F]{40}$/,
            // Block height (numbers only)
            blockHeight: /^\d+$/
        };

        // Check if query matches any valid pattern
        const isValidFormat = Object.values(validPatterns).some(pattern => 
            pattern.test(cleanQuery)
        );

        return {
            isValid: isValidFormat,
            error: isValidFormat ? null : "INVALID_SEARCH"
        };
    }

    function showLoading() {
        const resultContainer = document.getElementById('result-container');
        resultContainer.innerHTML = '<div class="loading">Searching</div>';
    }

    function performSearch(query) {
        const validation = validateSearchQuery(query);
        
        if (!validation.isValid) {
            displayError(validation.error);
            return;
        }

        // Redirect to bitcoin.html with the query parameter
        window.location.href = `/bitcoin?q=${encodeURIComponent(query)}`;
    }

    // Error message constants
    const ERROR_MESSAGES = {
        API_FAILURE: 'Blockchain search got the hiccups. Try again later.',
        UNKNOWN_RESULT: 'Unknown result type',
        NETWORK_ERROR: 'Network connection issue. Please check your internet.',
        INVALID_SEARCH: 'Invalid search format',
        EMPTY_SEARCH: 'Please enter a search term'
    };

    // Update displayError usage
    function displayError(errorType) {
        const resultContainer = document.getElementById('result-container');
        resultContainer.innerHTML = `<div class="error-message">${ERROR_MESSAGES[errorType]}</div>`;
    }
    </script>
</body>
</html>
