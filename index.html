<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Explorer</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 70vh;
        width: 100vw;
    }
    
    .container {
        text-align: center;
    }
    
    .logo {
        max-width: 350px;
        margin-bottom: 20px;
    }
    
    .search-bar {
        position: relative;
        width: 800px;
        height: 30px;
        padding: 10px 30px 10px 10px;
        font-size: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-image: url("magnifying-glass.png");
        background-repeat: no-repeat;
        background-position: right 10px center;
    }
    
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Blockchain Explorer Logo" class="logo">
        <br><br><br>
        <div>
            <input type="text" class="search-bar" placeholder="Search by block height, transaction hash, or address...">
        </div>
    </div>
</body>
</html>
