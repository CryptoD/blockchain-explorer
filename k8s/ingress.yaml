apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blockchain-explorer-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CDN-related annotations (assuming Cloudflare or similar)
    nginx.ingress.kubernetes.io/proxy-real-ip-cidr: "0.0.0.0/0"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_cache_bypass $http_upgrade;
      add_header X-Cache-Status $upstream_cache_status;
spec:
  tls:
  - hosts:
    - blockchain-explorer.example.com
    secretName: blockchain-explorer-tls
  rules:
  - host: blockchain-explorer.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blockchain-explorer-service
            port:
              number: 3000