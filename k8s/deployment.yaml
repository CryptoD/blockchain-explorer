# Legacy raw Kubernetes manifests (pre-Helm).
# Prefer deploy/helm/blockchain-explorer for new installs — see deploy/README.md.
#
# This file contains the app Deployment + Redis only. The app is Redis-only; Postgres
# manifests were moved to legacy-postgres.yaml (unused by the application).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockchain-explorer
  template:
    metadata:
      labels:
        app: blockchain-explorer
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: app
        image: blockchain-explorer:latest  # Replace with your registry image@digest
        ports:
        - name: http
          containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_PORT
          value: "8080"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: GETBLOCK_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: getblock-base-url
        - name: GETBLOCK_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: getblock-access-token
        - name: ADMIN_USERNAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: admin-username
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: admin-password
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        livenessProbe:
          exec:
            command:
              - redis-cli
              - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-explorer-service
spec:
  selector:
    app: blockchain-explorer
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  getblock-base-url: "https://your-getblock-url"  # Replace with actual URL
  admin-username: "admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  getblock-access-token: "<replace-me>"  # Replace via kubectl create secret or sealed-secrets
  admin-password: "<replace-me>"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
