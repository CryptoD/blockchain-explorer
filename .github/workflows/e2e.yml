name: E2E

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: development
      REDIS_HOST: localhost
      GETBLOCK_BASE_URL: https://example.invalid/
      GETBLOCK_ACCESS_TOKEN: e2e-ci-token
      HTTP_LISTEN_ADDR: 127.0.0.1:18080
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:18080
      CI: 'true'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'

    - name: Install npm dependencies
      run: npm install

    - name: Build CSS
      run: npm run build:css

    - name: Build server binary
      run: go build -o explorer ./cmd/server

    - name: Start server
      run: |
        set -euo pipefail
        ./explorer &
        for i in $(seq 1 60); do
          if curl -sf "http://127.0.0.1:18080/health" > /dev/null; then
            echo "Server is up"
            exit 0
          fi
          sleep 1
        done
        echo "Server failed to become healthy"
        exit 1

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npm run test:e2e

    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
