name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify gofmt (simplified)
      run: |
        set -euo pipefail
        out=$(gofmt -s -l .)
        if [ -n "$out" ]; then
          echo "::error::Run gofmt -s -w on: $out"
          echo "$out"
          exit 1
        fi

    - name: Verify goimports
      run: |
        set -euo pipefail
        go install golang.org/x/tools/cmd/goimports@v0.30.0
        export PATH="$(go env GOPATH)/bin:$PATH"
        out=$(goimports -l .)
        if [ -n "$out" ]; then
          echo "::error::Run goimports -w on: $out"
          echo "$out"
          exit 1
        fi

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.4

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Install gosec
      run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.10

    - name: Run gosec
      run: |
        set -euo pipefail
        echo "## gosec" >> "$GITHUB_STEP_SUMMARY"
        echo "Static analysis for Go security issues (see job log for full output)." >> "$GITHUB_STEP_SUMMARY"
        "$(go env GOPATH)/bin/gosec" -fmt text -stdout -verbose ./...

    - name: Trivy fs (Go modules & lockfiles)
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        scan-type: fs
        scan-ref: .
        scanners: vuln
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: '1'
        skip-dirs: node_modules,.git,dist,build,.tmp,vendor

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests with coverage
      run: |
        set -euo pipefail
        go test -coverprofile=coverage.out -covermode=atomic ./...

    - name: Enforce per-package coverage (ratchet)
      run: ./scripts/check_coverage.sh

    - name: Coverage summary
      run: |
        echo "## Go test coverage" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Full per-file breakdown is in the uploaded \`coverage.out\` artifact." >> "$GITHUB_STEP_SUMMARY"

    - name: Generate HTML coverage report
      run: go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v7
      with:
        name: go-coverage
        path: |
          coverage.out
          coverage.html
        retention-days: 14

    - name: Upload coverage to Codecov
      if: ${{ secrets.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.out
        disable_search: true
        fail_ci_if_error: true

    - name: Build
      run: go build -v ./...

  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend (CSS + stamped HTML)
      run: npm run build

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Build Docker image
      run: docker build -t blockchain-explorer:latest --build-arg "ASSET_VERSION=${GITHUB_SHA:0:7}" .

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        scan-type: image
        image-ref: blockchain-explorer:latest
        scanners: vuln
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: '1'